apiVersion: apps/v1
kind: Deployment
metadata:
  name: funtechpay-frontend
  labels:
    app: funtechpay-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: funtechpay-frontend
  template:
    metadata:
      labels:
        app: funtechpay-frontend
    spec:
      containers:
      - name: funtechpay-frontend
        image: :latest # Will be replaced during deployment
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: funtechpay-frontend-service
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: funtechpay-frontend
